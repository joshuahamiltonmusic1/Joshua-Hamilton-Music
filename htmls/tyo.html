<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preload" href="../assets/audio/silly-pigeon-vid.mp4" as="video" type="video/mp4" crossorigin="anonymous">
    <link rel="preload" href="../assets/audio/these-beauties-vid.mp4" as="video" type="video/mp4" crossorigin="anonymous">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Young Offenders | Joshua Hamilton</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <link rel="stylesheet" href="../css/styles.css">
    
    <style>
        /* Header Non-Transparent Override */
        #site-navigation {
            background-color: #000000 !important;
        }

        /* Base Side Dots Container Layout */
        .scene-nav-dots {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 999999;
        }
        
        .nav-dot-row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .nav-dot-label {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease;
            white-space: nowrap;
        }
        
        .scene-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        
        .nav-dot-row.active .nav-dot-label {
            color: #ffffff;
        }
        .nav-dot-row.active .scene-dot {
            background: #ffffff;
            transform: scale(1.3);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* -------------------------------------------------------------
           ISOLATED DROPDOWN SYSTEM: Zero Horizontal Bleeding
        ------------------------------------------------------------- */
        .dropdown-group {
            position: relative;
            display: inline-block;
        }

        #manual-header-toggle {
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        /* ==========================================
           PC RESPONSIVE RULES (Excludes Landscape Phones)
           ========================================== */
        @media (min-width: 769px) and (orientation: portrait), (min-width: 950px) and (orientation: landscape) {
            .mobile-only-controls {
                display: none !important;
            }
            .pc-only-hud {
                display: block !important;
            }
            
            /* Hide the side navigation dots natively on PC layout viewports */
            .scene-nav-dots {
                display: none !important;
            }

            /* Push the progress bar out of absolute overlay mode to sit underneath video */
            .video-container {
                position: relative !important;
                display: flex;
                flex-direction: column;
                width: 100%;
            }
            
            .progress-bar-container {
                position: relative !important; 
                bottom: auto !important;
                left: auto !important;
                width: 100% !important;
                height: 6px !important;
                margin-top: 12px !important; 
                background: rgba(255, 255, 255, 0.2);
                border-radius: 3px;
                overflow: visible !important; 
                cursor: pointer !important;
                pointer-events: auto !important;
                z-index: 100 !important;
            }

            /* INVISIBLE HITBOX OVER FOR PERFECT MOUSE TARGETING */
            .progress-bar-container::before {
                content: '';
                position: absolute;
                top: -10px;
                bottom: -10px;
                left: 0;
                right: 0;
                background: transparent;
                z-index: 1;
            }

            /* Ensure visual fill sits correctly inside container layers */
            .progress-fill {
                position: relative;
                z-index: 2;
                border-radius: 3px;
            }
        }

        /* ==========================================
           MOBILE RESPONSIVE RULES (Includes Landscape Phones)
           ========================================== */
        @media (max-width: 950px) {
            #site-navigation .logo { 
                margin: 0 !important;
                text-align: left !important;
            }

            /* Keep dots hidden on mobile as well */
            .scene-nav-dots {
                display: none !important;
            }
            
            html, body, #theme-container {
                scroll-snap-type: y mandatory !important;
                scroll-behavior: smooth !important;
            }

            .soundscape-section {
                scroll-snap-align: start !important;
                scroll-snap-stop: always !important;
                justify-content: flex-start !important;
                padding-top: 100px !important;
                padding-bottom: 60px !important;
                height: auto !important;
            }

            .mobile-only-controls {
                display: flex !important;
                flex-direction: column !important;
                width: 100% !important;
                margin-top: 10px !important;
                margin-bottom: 15px !important;
                box-sizing: border-box !important;
                position: relative !important;
                z-index: 999999 !important;
                pointer-events: auto !important;
            }
            
            .mob-row-layout {
                display: flex !important;
                flex-direction: row !important;
                align-items: center !important;
                justify-content: flex-start !important;
                gap: 12px !important;
                width: 100% !important;
                margin-top: 12px !important;
                box-sizing: border-box !important;
                position: relative !important;
                z-index: 1000000 !important;
                pointer-events: auto !important;
            }

            .mob-btn-shrunk {
                width: 80px !important;
                height: 34px !important;
                min-width: 80px !important;
                max-width: 80px !important;
                padding: 0 !important;
                font-size: 0.75rem !important;
                font-weight: 600 !important;
                background: #ffffff !important;
                color: #000000 !important;
                border: none !important;
                border-radius: 6px !important;
                cursor: pointer !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                flex-shrink: 0 !important;
                box-sizing: border-box !important;
                position: relative !important;
                z-index: 1000001 !important;
                pointer-events: auto !important;
            }

            .mob-fader-extended {
                flex-grow: 1 !important;
                display: flex !important;
                flex-direction: column !important;
                align-items: flex-start !important;
                margin: 0 !important;
                padding: 0 !important;
                box-sizing: border-box !important;
                position: relative !important;
                z-index: 1000001 !important;
                pointer-events: auto !important;
            }

            .mob-fader-extended label {
                font-family: 'Inter', sans-serif !important;
                font-size: 0.6rem !important;
                font-weight: 600 !important;
                letter-spacing: 0.5px !important;
                text-transform: uppercase !important;
                margin-bottom: 4px !important;
                color: #ffffff !important;
                opacity: 0.7 !important;
                white-space: nowrap !important;
            }

            .mob-fader-extended input[type="range"] {
                width: 100% !important;
                height: 20px !important;
                margin: 0 !important;
                padding: 0 !important;
                cursor: pointer !important;
                display: block !important;
                position: relative !important;
                z-index: 1000002 !important;
                pointer-events: auto !important;
            }
            
            /* Preserve original absolute overlay design strictly on mobile devices */
            .video-container {
                position: relative !important;
                z-index: 1 !important;
            }

            .progress-bar-container {
                position: absolute !important;
                bottom: 0 !important;
                left: 0 !important;
                width: 100% !important;
                height: 6px !important;
                background: rgba(255, 255, 255, 0.2);
                cursor: pointer;
            }
        }
    </style>
</head>
<body>

        <div class="global-hud-interface pc-only-hud" id="comp-dynamic-hud">

            <div style="width: 85%; max-width: 900px; display: flex; flex-direction: column; align-items: flex-start;">
                
                <div class="mobile-only-controls">
                    <h2 style="margin: 0; margin-bottom: 5px; font-size: 1.1rem; font-weight: 600; color: #ffffff;">The Young Offenders (Season 5 Ep. 6) scene 2</h2>
                    <p style="margin: 0; font-size: 0.8rem; opacity: 0.8; color: #ffffff;">Composed by Joshua Hamilton</p>
                    
                    <div class="mob-row-layout" data-scene="scene-beauties">

                    <div class="progress-bar-container" data-scene="scene-beauties">

    </main>
    
    <script src="../javascripts/main.js"></script>
    <script src="../javascripts/compositions.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', () => {
        // Check if the URL has the specific projects hash
        if (window.location.hash === '#scene-pigeon') {
            // Prevent default instant browser jump
            const targetId = window.location.hash;
            history.replaceState(null, null, ' ');
            
            // Wait until all assets are completely loaded to get accurate positions
            window.addEventListener('load', () => {
                const targetElement = document.querySelector(targetId);
                if (targetElement) {
                    setTimeout(() => {
                        targetElement.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                        // Re-apply the hash to the URL without jumping
                        history.pushState(null, null, targetId);
                    }, 100); // Micro-delay ensures rendering is complete
                }
            });
        }
    });
</script>
<script src="../javascripts/imageloader.js" defer></script>

<script>
    window.addEventListener('load', () => {
        const queueExecutionMethod = window.requestIdleCallback || function(cb) { setTimeout(cb, 2000); };
        queueExecutionMethod(() => {
            const secondaryPool = [
                '../assets/audio/LIVE WILD/live wild.mp3',
                '../assets/audio/GENESIS/1 IN THE BEGINNING.mp3',
                '../assets/audio/CLOCKS/clocks.mp3'
            ];
            secondaryPool.forEach((audioUrl) => {
                const backgroundFetch = new Audio();
                backgroundFetch.src = audioUrl;
                backgroundFetch.preload = 'auto';
            });
        });
    });
</script>
</body>
