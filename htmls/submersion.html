<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submersion | Joshua Hamilton</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        /* -------------------------------------------------------------
           ISOLATED DROPDOWN SYSTEM: Zero Horizontal Bleeding
        ------------------------------------------------------------- */
        .dropdown-group {
            position: relative;
            display: inline-block;
        }

        #manual-header-toggle {
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        .dropdown-nav .dropdown-group a.dropdown-trigger {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .header-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .action-btn {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.65);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .action-btn:hover {
            color: #ffffff;
        }

        /* -------------------------------------------------------------
           TRACK WORKSPACE CONTAINER ENGINE
        ------------------------------------------------------------- */
        .workspace-page-wrapper {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 160px 40px 80px 40px;
            background-color: #050505;
            box-sizing: border-box;
        }

        .workspace-container {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 48px;
        }

        .workspace-header {
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 32px;
        }

        .workspace-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .workspace-header p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.5);
            margin: 0;
            max-width: 680px;
        }

        .track-deck {
            display: flex;
            flex-direction: column;
            gap: 28px;
            width: 100%;
        }

        /* -------------------------------------------------------------
           GLASSMORPHIC TRACK CARD DESIGN WITH LIGHT-UP HOVER
        ------------------------------------------------------------- */
        .audio-track-card {
            position: relative;
            background: rgba(15, 15, 15, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 32px;
            backdrop-filter: blur(25px);
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 32px;
            align-items: center;
            box-sizing: border-box;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .track-card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../assets/Images/submersion.webp');
            background-size: cover;
            background-position: center;
            opacity: 0.40; 
            pointer-events: none;
            z-index: -2;
            transition: opacity 0.3s ease;
        }

        .track-card-darkener {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            opacity: 0.05; 
            pointer-events: none;
            z-index: -1;
            transition: opacity 0.3s ease;
        }

        .audio-track-card:hover {
            transform: translateY(-3px);
            border-color: rgba(219, 176, 74, 0.45);
            background: rgba(30, 30, 30, 0.45);
            box-shadow: 
                0 12px 40px rgba(219, 176, 74, 0.12), 
                inset 0 0 20px rgba(219, 176, 74, 0.05);
        }

        .audio-track-card:hover .track-card-darkener {
            opacity: 0.20 !important;
        }

        .audio-track-card:hover .track-card-bg {
            opacity: 0.75 !important;
        }

        .play-trigger-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
        }

        .play-button-disk {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .play-button-disk:hover {
            background: rgba(219, 176, 74, 0.1);
            border-color: rgba(219, 176, 74, 0.4);
            transform: scale(1.05);
        }

        .play-icon {
            width: 18px;
            height: 18px;
            fill: #ffffff;
            margin-left: 2px;
            transition: fill 0.2s ease;
        }

        .play-button-disk:hover .play-icon {
            fill: #ffe082;
        }

        .track-main-interface {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .track-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .track-title-block h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffffff;
            margin: 0;
            margin-bottom: 4px;
            transition: color 0.3s ease;
        }

        .audio-track-card:hover h2 {
            color: #ffe082;
        }

        .track-title-block p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
            margin: 0;
        }

        .track-duration-stamp {
            font-family: monospace;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .timeline-container {
            position: relative;
            width: 100%;
            height: 48px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 6px;
            cursor: pointer;
            overflow: hidden;
        }

        .waveform-asset-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../assets/Images/waveforms/submersion wf.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            opacity: 0.25;
            pointer-events: none;
        }

        .timeline-progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: rgba(219, 176, 74, 0.15);
            border-right: 2px solid #dbb04a;
            pointer-events: none;
        }

        @media (max-width: 650px) {
            .audio-track-card {
                grid-template-columns: 1fr;
                gap: 24px;
                padding: 24px;
            }
            .play-trigger-wrapper {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>

<header id="site-navigation">
    <div class="nav-top-row">
        <a href="../home.html" class="logo" style="text-decoration: none; font-weight: 700;">Joshua Hamilton</a>
        <div class="header-actions">
            <a href="./about.html" class="action-btn" id="btn-about" style="text-decoration: none; line-height: normal; display: flex; align-items: center;">About</a>
            <a href="./contact.html" class="action-btn" id="btn-contact" style="text-decoration: none; line-height: normal; display: flex; align-items: center;">Contact</a>
        </div>
    </div>
    
    <div class="nav-bottom-row">
        <nav class="dropdown-nav">
            <a href="../home.html" class="nav-link" style="font-family: 'Inter', sans-serif; font-weight: 500; font-size: 0.8rem; color: rgba(255, 255, 255, 0.65); text-decoration: none; transition: color 0.2s ease;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='rgba(255, 255, 255, 0.65)'">Home</a>
            
            <!-- Projects Routing Setup -->
            <div class="dropdown-group">
                <a href="./projbuff.html" class="nav-link dropdown-trigger" style="text-decoration: none;">Projects</a>
            </div>
            
            <!-- Compositions Routing Setup -->
            <div class="dropdown-group">
                <a href="./compbuff.html" class="nav-link dropdown-trigger" style="text-decoration: none;">Compositions</a>
            </div>

            <!-- Sound Design Routing Setup -->
            <div class="dropdown-group">
                <a href="./sdbuff.html" class="nav-link dropdown-trigger" style="text-decoration: none; color: #ffffff;">Sound Design</a>
            </div>
        </nav>
    </div>

    <button id="manual-header-toggle" aria-label="Toggle Navigation Panel">
        <span class="toggle-arrow">▲</span>
    </button>
</header>

<main class="workspace-page-wrapper">
    <div class="workspace-container">
        
        <div class="workspace-header">
            <h1>Submersion</h1>
            <p>Please use headphones for a full, immersive experience.</p>
        </div>

        <div class="track-deck">
            
            <!-- Track Card 1: Submersion -->
            <div class="audio-track-card">
                <div class="track-card-bg"></div>
                <div class="track-card-darkener"></div>
                
                <div class="play-trigger-wrapper">
                    <div class="play-button-disk" data-track-src="../assets/audio/SUBMERSION/submersion.wav" aria-label="Play Track">
                        <svg class="play-icon" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </div>
                </div>
                
                <div class="track-main-interface">
                    <div class="track-meta">
                        <div class="track-title-block">
                            <h2>Submersion</h2>
                            <p>Dark, immersive deep-sea nightmare.</p>
                        </div>
                        <div class="track-duration-stamp">0:00</div>
                    </div>
                    
                    <div class="timeline-container">
                        <div class="waveform-asset-mask"></div>
                        <div class="timeline-progress-bar"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</main>

<script>
    (function() {
        const navPanel = document.getElementById('site-navigation');
        const toggleButton = document.getElementById('manual-header-toggle');
        if (navPanel && toggleButton) {
            toggleButton.addEventListener('click', (e) => {
                e.stopPropagation();
                e.preventDefault();
                navPanel.classList.toggle('nav-panel-hidden');
            });
        }
    })();
</script>
<script src="../javascripts/player.js"></script>
<script src="../javascripts/imageloader.js" defer></script>
</body>
</html>
